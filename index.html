<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WashCars</title>
    <link rel="icon" href="data:,"> <!-- 빈 데이터 URI로 기본 아이콘 제거 --> 
    <link rel="stylesheet" href="./style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/",
                "@dimforge/rapier3d-compat": "https://cdn.skypack.dev/@dimforge/rapier3d-compat"
            }
        }
    </script>
</head>
<body>
    <!-- 시작 및 로딩 화면 -->
    <div id="start-overlay" class="start-overlay">
        <div id="start-message" class="start-message">로딩 중...</div>
        <button id="start-button" class="start-button" type="button" hidden>시작</button>
    </div>

    <div id="cursor"></div>

    <!-- 게임 화면을 가리는 UI 팝업 (예: 일시정지 메뉴) -->
    <div id="menu" class="ui-popup">
        <h2 id="menu-title" class="menu-title">게임 일시정지</h2>

        <div id="menu-volume-panel" class="menu-volume-panel">
            <label for="master-volume" class="menu-label">소리 조절</label>
            <div class="menu-volume-row">
                <input id="master-volume" class="menu-volume-slider" type="range" min="0" max="100" value="70">
                <span id="master-volume-value" class="menu-volume-value">70%</span>
            </div>
        </div>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
